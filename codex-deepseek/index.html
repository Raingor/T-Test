<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5-in-1 前端可视化仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
/* ========== 全局重置 ========== */
*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; height: 100%;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

/* ========== 标签页导航 ========== */
.tab-bar {
  display: flex;
  background: #0f0f1a;
  border-bottom: 1px solid #1e1e3a;
  overflow-x: auto;
  flex-shrink: 0;
}
.tab-btn {
  padding: 14px 22px;
  background: transparent;
  border: none;
  color: #666;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  position: relative;
  font-weight: 500;
  border-bottom: 2px solid transparent;
}
.tab-btn:hover { color: #aaa; background: rgba(255,255,255,0.03); }
.tab-btn.active {
  color: #fff;
  border-bottom-color: #6c5ce7;
  background: rgba(108,92,231,0.08);
}
.tab-btn .badge {
  display: inline-block;
  width: 24px; height: 24px;
  line-height: 24px;
  text-align: center;
  border-radius: 6px;
  font-size: 12px;
  margin-right: 6px;
  vertical-align: middle;
}

/* ========== 模块容器 ========== */
.module-container {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.module-container.hidden { display: none; }

/* ========== 模块1: Canvas 引力弹球 ========== */
#module-1 { background: #0a0a14; }
#canvas-particle {
  display: block;
  width: 100%;
  height: 100%;
}
.particle-stats {
  position: absolute;
  top: 16px; left: 16px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.08);
  pointer-events: none;
  z-index: 10;
}

/* ========== 模块2: 拖拽看板 ========== */
#module-2 {
  display: flex;
  gap: 16px;
  padding: 20px;
  background: #0d0d1a;
  overflow-x: auto;
  align-items: flex-start;
}
.kanban-col {
  flex: 1;
  min-width: 280px;
  max-width: 380px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
}
.kanban-col-header {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.kanban-count {
  background: rgba(255,255,255,0.08);
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 11px;
}
.kanban-card {
  background: #1a1a2e;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: grab;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
  user-select: none;
  color: #ddd;
  font-size: 13px;
  line-height: 1.4;
  position: relative;
}
.kanban-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(108,92,231,0.15);
  border-color: rgba(108,92,231,0.3);
}
.kanban-card.dragging {
  opacity: 0.4;
  transform: scale(0.95);
}
.kanban-card.drag-over {
  border-top: 2px solid #6c5ce7;
  margin-top: -1px;
}
.kanban-card .card-del {
  position: absolute;
  top: 6px; right: 8px;
  width: 18px; height: 18px;
  line-height: 16px;
  text-align: center;
  font-size: 14px;
  color: rgba(255,255,255,0.2);
  cursor: pointer;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.kanban-card:hover .card-del { opacity: 1; }
.kanban-card .card-del:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }
.kanban-add {
  margin-top: auto;
  padding: 10px 0;
  color: rgba(255,255,255,0.3);
  font-size: 13px;
  cursor: pointer;
  transition: color 0.2s;
  text-align: center;
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 8px;
  margin-top: 8px;
}
.kanban-add:hover { color: #6c5ce7; border-color: rgba(108,92,231,0.3); }

/* ========== 模块3: SVG 实时折线 ========== */
#module-3 {
  display: flex;
  flex-direction: column;
  background: #0a0a14;
}
#chart-container {
  flex: 1;
  position: relative;
  padding: 0;
}
#chart-container svg {
  display: block;
  width: 100%;
  height: 100%;
}
.chart-stats {
  position: absolute;
  top: 16px; right: 20px;
  text-align: right;
  pointer-events: none;
  z-index: 5;
}
.chart-stats div {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  line-height: 1.6;
}
.chart-stats span { color: rgba(255,255,255,0.7); font-weight: 600; }

/* ========== 模块4: A* 寻路 ========== */
#module-4 {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #0a0a14;
  padding: 20px;
  gap: 16px;
}
#grid-container {
  display: grid;
  gap: 1px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}
.grid-cell {
  width: 100%; height: 100%;
  background: #16162a;
  transition: background 0.08s;
  cursor: pointer;
}
.grid-cell.start { background: #00d68f; }
.grid-cell.end { background: #ff6b6b; }
.grid-cell.wall { background: #2d2d5e; }
/* A* animation colors */
.grid-cell.explored { background: #3a3a8a; }
.grid-cell.frontier { background: #5a5aaa; }
.grid-cell.path { background: #ffd93d; }
#maze-controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
#maze-controls button, #maze-controls .maze-hint {
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}
.maze-btn-primary { background: #6c5ce7; color: #fff; }
.maze-btn-primary:hover { background: #7c6cf7; }
.maze-btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
.maze-btn-danger { background: rgba(255,107,107,0.2); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3) !important; }
.maze-btn-danger:hover { background: rgba(255,107,107,0.3); }
.maze-hint { color: rgba(255,255,255,0.4); font-size: 12px; line-height: 36px; }

/* ========== 模块5: 自定义播放器 ========== */
#module-5 {
  display: flex;
  flex-direction: column;
  background: #080812;
  position: relative;
}
#player-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
#player-video {
  flex: 1;
  width: 100%;
  object-fit: contain;
  background: #000;
}
#player-controls {
  flex-shrink: 0;
  background: rgba(15,15,30,0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#progress-container {
  position: relative;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  cursor: pointer;
  margin-bottom: 4px;
  transition: height 0.15s;
}
#progress-container:hover { height: 8px; }
#progress-buffered {
  position: absolute;
  top: 0; left: 0; height: 100%;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
}
#progress-played {
  position: absolute;
  top: 0; left: 0; height: 100%;
  background: linear-gradient(90deg, #6c5ce7, #a29bfe);
  border-radius: 3px;
  pointer-events: none;
}
#progress-thumb {
  position: absolute;
  top: 50%;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #a29bfe;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px rgba(108,92,231,0.5);
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
#progress-container:hover #progress-thumb { opacity: 1; }
#progress-preview {
  position: absolute;
  bottom: 20px;
  display: none;
  pointer-events: none;
  transform: translateX(-50%);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 4px;
  overflow: hidden;
}
#progress-preview video {
  display: block;
  width: 160px;
  height: 90px;
}
#controls-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.ctrl-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  transition: all 0.15s;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
#time-display {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  font-variant-numeric: tabular-nums;
  min-width: 90px;
}
#volume-container {
  display: flex;
  align-items: center;
  gap: 6px;
}
#volume-slider {
  width: 70px;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  outline: none;
}
#volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #a29bfe;
  cursor: pointer;
}
.player-spacer { flex: 1; }

/* ========== 滚动条美化 ========== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body class="flex flex-col h-full bg-[#0a0a14] text-white overflow-hidden">

<!-- ========== 顶部标题栏 ========== -->
<header class="flex items-center justify-between px-6 py-3 bg-[#0f0f1a] border-b border-[#1e1e3a] flex-shrink-0">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-[#6c5ce7] to-[#a29bfe] flex items-center justify-center text-white font-bold text-sm">5</div>
    <h1 class="text-base font-semibold text-white/90">前端可视化仪表盘</h1>
  </div>
  <div class="text-xs text-white/30">codex-deepseek</div>
</header>

<!-- ========== 标签页导航 ========== -->
<nav class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="1"><span class="badge bg-[#6c5ce7]/20 text-[#6c5ce7]">✦</span>引力弹球</button>
  <button class="tab-btn" data-tab="2"><span class="badge bg-[#00d68f]/20 text-[#00d68f]">☰</span>任务看板</button>
  <button class="tab-btn" data-tab="3"><span class="badge bg-[#ffd93d]/20 text-[#ffd93d]">╱</span>实时折线</button>
  <button class="tab-btn" data-tab="4"><span class="badge bg-[#ff6b6b]/20 text-[#ff6b6b]">✦</span>A* 寻路</button>
  <button class="tab-btn" data-tab="5"><span class="badge bg-[#a29bfe]/20 text-[#a29bfe]">▶</span>播放器</button>
</nav>

<!-- ========== 模块容器区域 ========== -->
<main class="flex flex-col flex-1 overflow-hidden relative">

  <!-- 模块1: Canvas 引力弹球 -->
  <div id="module-1" class="module-container">
    <canvas id="canvas-particle"></canvas>
    <div class="particle-stats" id="particleStats">粒子: <span id="particleCount">500</span> | FPS: <span id="fpsDisplay">60</span></div>
  </div>

  <!-- 模块2: 拖拽看板 -->
  <div id="module-2" class="module-container hidden"></div>

  <!-- 模块3: SVG 实时折线 -->
  <div id="module-3" class="module-container hidden">
    <div id="chart-container">
      <svg viewBox="0 0 800 400" preserveAspectRatio="none">
        <path id="chart-path" fill="none" stroke="#6c5ce7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 网格辅助线 -->
        <line x1="0" y1="0" x2="800" y2="0" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        <line x1="0" y1="100" x2="800" y2="100" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        <line x1="0" y1="200" x2="800" y2="200" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        <line x1="0" y1="300" x2="800" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        <line x1="0" y1="400" x2="800" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      </svg>
      <div class="chart-stats">
        <div>最大 <span id="chartMax">--</span></div>
        <div>最小 <span id="chartMin">--</span></div>
        <div>数据点 <span id="chartN">0</span>/50</div>
      </div>
    </div>
  </div>

  <!-- 模块4: A* 寻路 -->
  <div id="module-4" class="module-container hidden">
    <div id="grid-container"></div>
    <div id="maze-controls">
      <button id="mazeStartBtn" class="maze-btn-primary">开始寻路</button>
      <button id="mazeClearBtn" class="maze-btn-danger">清除墙壁</button>
      <button id="mazeResetBtn" class="maze-btn-danger">全部重置</button>
      <span class="maze-hint">点击设起点/终点 · 拖拽画墙</span>
    </div>
  </div>

  <!-- 模块5: 自定义播放器 -->
  <div id="module-5" class="module-container hidden">
    <div id="player-container">
      <video id="player-video" src="../task-list/test.mp4" preload="auto"></video>
      <div id="player-controls">
        <div id="progress-container">
          <div id="progress-buffered"></div>
          <div id="progress-played"></div>
          <div id="progress-thumb"></div>
          <div id="progress-preview"><video></video></div>
        </div>
        <div id="controls-row">
          <button id="playBtn" class="ctrl-btn" title="播放/暂停">▶</button>
          <span id="time-display">0:00 / 0:00</span>
          <div id="volume-container">
            <button id="muteBtn" class="ctrl-btn" title="静音">🔊</button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8">
          </div>
          <div class="player-spacer"></div>
          <button id="fullscreenBtn" class="ctrl-btn" title="全屏">⛶</button>
        </div>
      </div>
    </div>
  </div>

</main>

<script>
/* ===================================================================
   生命周期管理器 (Lifecycle Manager)
   管理5个模块的初始化、暂停、恢复，实现标签页切换时的 CPU 释放
   =================================================================== */
const Lifecycle = {
  /** @type {Object<string, { init: Function, pause: Function, resume: Function, inited: boolean }>} */
  _modules: {},
  _currentTab: null,

  register(id, mod) {
    this._modules[id] = { ...mod, inited: false };
  },

  switchTab(id) {
    if (this._currentTab === id) return;
    // 暂停当前模块
    if (this._currentTab !== null && this._modules[this._currentTab]) {
      const cur = this._modules[this._currentTab];
      if (cur.pause) cur.pause();
    }
    // 切换容器显示
    document.querySelectorAll('.module-container').forEach(el => el.classList.add('hidden'));
    const container = document.getElementById('module-' + id);
    if (container) container.classList.remove('hidden');
    // 初始化或恢复目标模块
    const next = this._modules[id];
    if (next) {
      if (!next.inited) {
        if (next.init) { next.init(); }
        next.inited = true;
      } else if (next.resume) {
        next.resume();
      }
    }
    // 更新标签高亮
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    const tabBtn = document.querySelector('.tab-btn[data-tab="' + id + '"]');
    if (tabBtn) tabBtn.classList.add('active');
    this._currentTab = id;
  },

  getCurrentTab() { return this._currentTab; }
};

/* ===================================================================
   模块1: Canvas 引力弹球模拟器
   - 500 粒子 + 中心引力源
   - 空间哈希网格 (Spatial Hash Grid) 优化碰撞检测
   - Retina 视网膜屏适配 (devicePixelRatio)
   - 重叠修正 (Position Correction)
   =================================================================== */
(function() {
  const M1 = {};
  let canvas, ctx, animId = null;
  let W = 0, H = 0, dpr = 1;
  const PARTICLE_COUNT = 500;
  const GRAVITY_STRENGTH = 800;
  const MAX_RADIUS = 5;
  let particles = [];

  /* ---------- 空间哈希网格 ---------- */
  class SpatialHash {
    constructor(cellSize) {
      this.cellSize = cellSize;
      this.grid = new Map();
    }
    _key(x, y) { return Math.floor(x/this.cellSize)+','+Math.floor(y/this.cellSize); }
    clear() { this.grid.clear(); }
    insert(p) {
      const k = this._key(p.x, p.y);
      if (!this.grid.has(k)) this.grid.set(k, []);
      this.grid.get(k).push(p);
    }
    getNearby(p) {
      const cx = Math.floor(p.x/this.cellSize);
      const cy = Math.floor(p.y/this.cellSize);
      const result = [];
      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          const k = (cx+dx)+','+(cy+dy);
          const cell = this.grid.get(k);
          if (cell) { for (const q of cell) result.push(q); }
        }
      }
      return result;
    }
  }

  const spatial = new SpatialHash(MAX_RADIUS * 2 + 2);

  /* ---------- 粒子 ---------- */
  class Particle {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.vx = (Math.random() - 0.5) * 120;
      this.vy = (Math.random() - 0.5) * 120;
      this.radius = 2 + Math.random() * 3;
      this.color = `hsl(${Math.random()*360}, 80%, 60%)`;
      this.mass = this.radius;
    }
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      particles.push(new Particle(x, y));
    }
  }

  /* ---------- 物理更新 ---------- */
  function updatePhysics(dt) {
    if (dt <= 0 || dt > 0.05) dt = 0.016;
    const gravityCenterX = W / 2;
    const gravityCenterY = H / 2;

    // 1) 引力 & 移动
    for (const p of particles) {
      const dx = gravityCenterX - p.x;
      const dy = gravityCenterY - p.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const force = GRAVITY_STRENGTH / (dist + 50);
      p.vx += (dx/dist) * force * dt;
      p.vy += (dy/dist) * force * dt;
      // 速度阻尼
      p.vx *= 0.999;
      p.vy *= 0.999;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      // 边界反弹
      if (p.x < p.radius) { p.x = p.radius; p.vx = -p.vx * 0.6; }
      if (p.x > W - p.radius) { p.x = W - p.radius; p.vx = -p.vx * 0.6; }
      if (p.y < p.radius) { p.y = p.radius; p.vy = -p.vy * 0.6; }
      if (p.y > H - p.radius) { p.y = H - p.radius; p.vy = -p.vy * 0.6; }
    }

    // 2) 空间哈希碰撞检测
    spatial.clear();
    for (const p of particles) spatial.insert(p);

    for (const p of particles) {
      const neighbors = spatial.getNearby(p);
      for (const q of neighbors) {
        if (p === q) continue;
        const dx = q.x - p.x;
        const dy = q.y - p.y;
        const distSq = dx*dx + dy*dy;
        const minDist = p.radius + q.radius;
        if (distSq >= minDist * minDist) continue;
        const dist = Math.sqrt(distSq) || 0.001;
        // 重叠修正 (Position Correction)
        const overlap = (minDist - dist) * 0.5;
        const nx = dx / dist;
        const ny = dy / dist;
        p.x -= nx * overlap;
        p.y -= ny * overlap;
        q.x += nx * overlap;
        q.y += ny * overlap;
        // 弹性碰撞
        const dvx = p.vx - q.vx;
        const dvy = p.vy - q.vy;
        const dvn = dvx*nx + dvy*ny;
        if (dvn > 0) continue; // 正在远离
        const totalMass = p.mass + q.mass;
        const impulse = (2 * dvn) / totalMass;
        p.vx -= impulse * q.mass * nx;
        p.vy -= impulse * q.mass * ny;
        q.vx += impulse * p.mass * nx;
        q.vy += impulse * p.mass * ny;
      }
    }
  }

  /* ---------- 渲染 ---------- */
  function render() {
    ctx.clearRect(0, 0, W * dpr, H * dpr);
    // 绘制引力源光晕
    const grad = ctx.createRadialGradient(W*dpr/2, H*dpr/2, 0, W*dpr/2, H*dpr/2, 60*dpr);
    grad.addColorStop(0, 'rgba(108,92,231,0.12)');
    grad.addColorStop(1, 'rgba(108,92,231,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W*dpr, H*dpr);
    // 绘制粒子
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x * dpr, p.y * dpr, p.radius * dpr, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
  }

  let fpsFrames = 0, fpsTime = 0;

  function loop(timestamp) {
    if (!animId) return; // 已暂停
    const dt = timestamp ? Math.min((timestamp - (fpsTime || timestamp)) / 1000, 0.033) : 0.016;
    updatePhysics(dt);
    render();
    // FPS 统计
    fpsFrames++;
    if (timestamp - fpsTime >= 1000) {
      document.getElementById('fpsDisplay').textContent = fpsFrames;
      fpsFrames = 0;
      fpsTime = timestamp;
    }
    animId = requestAnimationFrame(loop);
  }

  /* ---------- resize ---------- */
  function resizeCanvas() {
    const container = document.getElementById('module-1');
    W = container.clientWidth;
    H = container.clientHeight;
    dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  /* ---------- 生命周期 ---------- */
  M1.init = function() {
    canvas = document.getElementById('canvas-particle');
    ctx = canvas.getContext('2d');
    resizeCanvas();
    initParticles();
    window.addEventListener('resize', onResize);
    document.getElementById('particleCount').textContent = PARTICLE_COUNT;
    animId = requestAnimationFrame(loop);
  };

  function onResize() {
    if (Lifecycle.getCurrentTab() !== '1') return;
    resizeCanvas();
  }

  M1.pause = function() {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
  };

  M1.resume = function() {
    if (!animId) {
      resizeCanvas();
      animId = requestAnimationFrame(loop);
    }
  };

  Lifecycle.register('1', M1);
})();

/* ===================================================================
   模块2: 纯原生拖拽看板
   - HTML5 Drag & Drop API
   - dragenter/dragleave 去抖
   - localStorage 持久化
   =================================================================== */
(function() {
  const M2 = {};
  const STORAGE_KEY = 'kanban_data_v2';
  const COLORS = ['#6c5ce7', '#00d68f', '#ff6b6b', '#ffd93d', '#a29bfe', '#fd79a8', '#00cec9', '#e17055'];

  /* ---------- 数据模型 ---------- */
  let data = {
    columns: [
      { id: 'todo', title: '待办', cards: [] },
      { id: 'doing', title: '进行中', cards: [] },
      { id: 'done', title: '已完成', cards: [] }
    ]
  };
  let dragSrcCardId = null;

  function loadData() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) { const parsed = JSON.parse(saved); if (parsed && parsed.columns) data = parsed; }
    } catch(e) {/* ignore */}
  }

  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {/* ignore */}
  }

  function nextId() { return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

  function addCard(colId, text) {
    const col = data.columns.find(c => c.id === colId);
    if (!col) return;
    const card = { id: nextId(), text: text || '新任务', color: COLORS[Math.floor(Math.random()*COLORS.length)] };
    col.cards.push(card);
    saveData();
    renderColumn(colId);
  }

  function deleteCard(colId, cardId) {
    const col = data.columns.find(c => c.id === colId);
    if (!col) return;
    col.cards = col.cards.filter(c => c.id !== cardId);
    saveData();
    renderColumn(colId);
  }

  function moveCard(cardId, fromColId, toColId, toIndex) {
    const fromCol = data.columns.find(c => c.id === fromColId);
    const toCol = data.columns.find(c => c.id === toColId);
    if (!fromCol || !toCol) return;
    const idx = fromCol.cards.findIndex(c => c.id === cardId);
    if (idx === -1) return;
    const [card] = fromCol.cards.splice(idx, 1);
    toCol.cards.splice(toIndex, 0, card);
    saveData();
    renderAllColumns();
  }

  /* ---------- 渲染 ---------- */
  let container;

  function renderAllColumns() {
    data.columns.forEach(col => renderColumn(col.id));
  }

  function renderColumn(colId) {
    const colEl = container.querySelector('.kanban-col[data-col="'+colId+'"]');
    if (!colEl) return;
    const col = data.columns.find(c => c.id === colId);
    const cardContainer = colEl.querySelector('.kanban-cards');
    const countEl = colEl.querySelector('.kanban-count');
    cardContainer.innerHTML = '';
    countEl.textContent = col.cards.length;
    col.cards.forEach(card => {
      const div = document.createElement('div');
      div.className = 'kanban-card';
      div.draggable = true;
      div.dataset.cardId = card.id;
      div.style.borderLeft = '3px solid ' + card.color;
      div.innerHTML = '<span>' + escHtml(card.text) + '</span><span class="card-del" data-action="delete">&times;</span>';
      // Drag events
      div.addEventListener('dragstart', onDragStart);
      div.addEventListener('dragend', onDragEnd);
      div.addEventListener('dragenter', onDragEnterCard);
      div.addEventListener('dragleave', onDragLeaveCard);
      div.addEventListener('dragover', e => e.preventDefault());
      // Delete
      div.querySelector('.card-del').addEventListener('click', function(e) {
        e.stopPropagation();
        deleteCard(colId, card.id);
      });
      cardContainer.appendChild(div);
    });
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  /* ---------- 拖拽事件 ---------- */
  let dragEnterCount = 0;

  function onDragStart(e) {
    const card = e.target.closest('.kanban-card');
    if (!card) return;
    dragSrcCardId = card.dataset.cardId;
    e.dataTransfer.effectAllowed = 'move';
    card.classList.add('dragging');
    // 迟延设置 data 以兼容 Firefox
    setTimeout(() => {
      try { e.dataTransfer.setData('text/plain', dragSrcCardId); } catch(ex) {}
    }, 0);
  }

  function onDragEnd(e) {
    document.querySelectorAll('.kanban-card').forEach(el => el.classList.remove('dragging', 'drag-over'));
    dragSrcCardId = null;
    dragEnterCount = 0;
  }

  function onDragEnterCard(e) {
    e.preventDefault();
    const card = e.target.closest('.kanban-card');
    if (!card || card.dataset.cardId === dragSrcCardId) return;
    dragEnterCount++;
    card.classList.add('drag-over');
  }

  function onDragLeaveCard(e) {
    const card = e.target.closest('.kanban-card');
    if (!card) return;
    dragEnterCount--;
    if (dragEnterCount <= 0) {
      card.classList.remove('drag-over');
      dragEnterCount = 0;
    }
  }

  /* ---------- 列 drop ---------- */
  function setupColumnDrop(colEl) {
    colEl.addEventListener('dragover', e => e.preventDefault());
    colEl.addEventListener('dragenter', function(e) { e.preventDefault(); });
    colEl.addEventListener('drop', function(e) {
      e.preventDefault();
      const colId = this.dataset.col;
      const targetCard = e.target.closest('.kanban-card');
      const cardId = dragSrcCardId || (e.dataTransfer.types.length ? '' : '');
      if (!cardId) return;
      // 找当前卡片所在列
      let fromColId = null;
      for (const col of data.columns) {
        if (col.cards.find(c => c.id === cardId)) { fromColId = col.id; break; }
      }
      if (!fromColId) return;
      const toCol = data.columns.find(c => c.id === colId);
      let toIndex = toCol.cards.length;
      if (targetCard) {
        const targetCol = targetCard.closest('.kanban-col');
        if (targetCol && targetCol.dataset.col === colId) {
          const idx = toCol.cards.findIndex(c => c.id === targetCard.dataset.cardId);
          if (idx !== -1) toIndex = idx;
        }
      }
      // 如果拖到同一列同一位置则跳过
      if (fromColId === colId) {
        const fromCol = data.columns.find(c => c.id === fromColId);
        const curIdx = fromCol.cards.findIndex(c => c.id === cardId);
        if (curIdx === toIndex || curIdx === toIndex - 1) return;
        if (curIdx < toIndex) toIndex--;
      }
      moveCard(cardId, fromColId, colId, toIndex);
      document.querySelectorAll('.kanban-card').forEach(el => el.classList.remove('drag-over'));
    });
  }

  /* ---------- 添加卡片 ---------- */
  function setupAddButtons() {
    container.querySelectorAll('.kanban-add').forEach(btn => {
      btn.addEventListener('click', function() {
        const colId = this.dataset.col;
        const text = prompt('输入任务内容:');
        if (text && text.trim()) addCard(colId, text.trim());
      });
    });
  }

  /* ---------- 生命周期 ---------- */
  M2.init = function() {
    container = document.getElementById('module-2');
    loadData();
    // 构建 DOM
    container.innerHTML = '';
    data.columns.forEach(col => {
      const colEl = document.createElement('div');
      colEl.className = 'kanban-col';
      colEl.dataset.col = col.id;
      colEl.innerHTML = `
        <div class="kanban-col-header">
          <span>${escHtml(col.title)}</span>
          <span class="kanban-count">${col.cards.length}</span>
        </div>
        <div class="kanban-cards"></div>
        <div class="kanban-add" data-col="${col.id}">+ 添加卡片</div>
      `;
      container.appendChild(colEl);
      setupColumnDrop(colEl);
    });
    renderAllColumns();
    setupAddButtons();
  };

  M2.pause = function() { /* 无定时器，不需要暂停 */ };
  M2.resume = function() { /* 无需操作 */ };

  Lifecycle.register('2', M2);
})();

/* ===================================================================
   模块3: SVG 实时心电图折线
   - 单 <path> 元素通过 d 属性动态绘图
   - 50 个数据点，100ms 间隔
   - Y 轴自动缩放，防突变闪烁
   =================================================================== */
(function() {
  const M3 = {};
  let intervalId = null;
  let dataPoints = [];
  const MAX_POINTS = 50;
  const INTERVAL_MS = 100;
  let pathEl, svgEl, chartContainer;

  /* ---------- 初始化 ---------- */
  M3.init = function() {
    pathEl = document.getElementById('chart-path');
    svgEl = pathEl.closest('svg');
    chartContainer = document.getElementById('chart-container');
    dataPoints = [];
    // 预填充冷启动数据
    for (let i = 0; i < MAX_POINTS; i++) {
      dataPoints.push(50 + Math.sin(i * 0.3) * 30 + (Math.random() - 0.5) * 10);
    }
    updateChart();
    intervalId = setInterval(addDataPoint, INTERVAL_MS);
  };

  /* ---------- 添加数据点 ---------- */
  function addDataPoint() {
    const last = dataPoints[dataPoints.length - 1] || 50;
    const drift = (Math.random() - 0.48) * 6;
    const noise = (Math.random() - 0.5) * 4;
    const newVal = Math.max(5, Math.min(95, last + drift + noise));
    dataPoints.push(newVal);
    if (dataPoints.length > MAX_POINTS) dataPoints.shift();
    updateChart();
  }

  /* ---------- 更新图表 ---------- */
  function updateChart() {
    const n = dataPoints.length;
    if (n === 0) return;
    // 计算 Y 轴极值（带 padding，防突变）
    const rawMin = Math.min(...dataPoints);
    const rawMax = Math.max(...dataPoints);
    const range = rawMax - rawMin || 1;
    const padding = range * 0.15;
    const yMin = rawMin - padding;
    const yMax = rawMax + padding;

    // 更新统计显示
    document.getElementById('chartMax').textContent = rawMax.toFixed(1);
    document.getElementById('chartMin').textContent = rawMin.toFixed(1);
    document.getElementById('chartN').textContent = n;

    // 构建 d 属性 (SVG viewBox: 0 0 800 400)
    const svgW = 800, svgH = 400;
    const points = [];
    for (let i = 0; i < n; i++) {
      const x = (i / (MAX_POINTS - 1 || 1)) * svgW;
      // Y 映射：yMin -> svgH, yMax -> 0
      const y = svgH - ((dataPoints[i] - yMin) / (yMax - yMin)) * svgH;
      points.push(x + ',' + y);
    }
    // 始终只维护一条 path
    pathEl.setAttribute('d', 'M' + points.join(' L'));
  }

  /* ---------- 生命周期 ---------- */
  M3.pause = function() {
    if (intervalId) { clearInterval(intervalId); intervalId = null; }
  };

  M3.resume = function() {
    if (!intervalId) {
      updateChart();
      intervalId = setInterval(addDataPoint, INTERVAL_MS);
    }
  };

  Lifecycle.register('3', M3);
})();

/* ===================================================================
   模块4: A* 寻路可视化
   - 30x30 网格
   - 异步 A* (async/await + sleep) 防止主线程死锁
   - requestAnimationFrame 风格可视化
   - 鼠标拖拽画墙，防鼠标滑出
   =================================================================== */
(function() {
  const M4 = {};
  const ROWS = 30, COLS = 30;
  let grid = [];
  let start = null, end = null;
  let isRunning = false;
  let gridContainer, wallDrawing = false, wallMode = true;

  const CELL_CLASSES = { start: 'start', end: 'end', wall: 'wall' };

  /* ---------- 工具: sleep ---------- */
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  /* ---------- 初始化网格 ---------- */
  function createGrid() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      const row = [];
      for (let c = 0; c < COLS; c++) {
        row.push({ r, c, wall: false, explored: false, frontier: false, path: false, isStart: false, isEnd: false });
      }
      grid.push(row);
    }
    start = { r: 5, c: 5 };
    end = { r: 24, c: 24 };
    grid[start.r][start.c].isStart = true;
    grid[end.r][end.c].isEnd = true;
  }

  function clearWalls() {
    for (const row of grid) for (const cell of row) {
      cell.wall = false;
      cell.explored = false;
      cell.frontier = false;
      cell.path = false;
    }
    renderGrid();
  }

  function resetAll() {
    isRunning = false;
    createGrid();
    renderGrid();
    document.getElementById('mazeStartBtn').disabled = false;
  }

  /* ---------- 渲染网格 (CSS Grid) ---------- */
  function renderGrid() {
    gridContainer.innerHTML = '';
    gridContainer.style.gridTemplateColumns = 'repeat('+COLS+', 1fr)';
    for (const row of grid) {
      for (const cell of row) {
        const div = document.createElement('div');
        div.className = 'grid-cell';
        div.dataset.r = cell.r;
        div.dataset.c = cell.c;
        if (cell.isStart) div.classList.add('start');
        if (cell.isEnd) div.classList.add('end');
        if (cell.wall) div.classList.add('wall');
        if (cell.explored) div.classList.add('explored');
        if (cell.frontier) div.classList.add('frontier');
        if (cell.path) div.classList.add('path');
        div.addEventListener('mousedown', onCellMouseDown);
        div.addEventListener('mouseenter', onCellMouseEnter);
        div.addEventListener('mouseup', onCellMouseUp);
        gridContainer.appendChild(div);
      }
    }
  }

  function getCellEl(r, c) {
    return gridContainer.querySelector('.grid-cell[data-r="'+r+'"][data-c="'+c+'"]');
  }

  /* ---------- 鼠标交互 ---------- */
  let modeCycle = 0; // 0: set start, 1: set end, 2: draw walls
  let lastDrawnCell = null;

  function onCellMouseDown(e) {
    if (isRunning) return;
    const r = parseInt(this.dataset.r), c = parseInt(this.dataset.c);
    const cell = grid[r][c];
    // 右键切换模式
    if (e.button === 2) {
      e.preventDefault();
      modeCycle = (modeCycle + 1) % 3;
      document.querySelectorAll('.grid-cell').forEach(el => el.style.cursor = modeCycle===0?'crosshair':modeCycle===1?'pointer':'cell');
      return;
    }
    if (e.button !== 0) return;

    if (modeCycle === 0) {
      // 设置起点
      if (cell.isEnd || cell.wall) return;
      grid[start.r][start.c].isStart = false;
      start = { r, c };
      cell.isStart = true;
      renderGrid();
      modeCycle = 1;
    } else if (modeCycle === 1) {
      // 设置终点
      if (cell.isStart || cell.wall) return;
      grid[end.r][end.c].isEnd = false;
      end = { r, c };
      cell.isEnd = true;
      renderGrid();
      modeCycle = 2;
    } else {
      // 画墙
      wallDrawing = true;
      lastDrawnCell = { r, c };
      if (!cell.isStart && !cell.isEnd) {
        cell.wall = !cell.wall;
        getCellEl(r, c)?.classList.toggle('wall');
      }
    }
  }

  function onCellMouseEnter(e) {
    if (isRunning || !wallDrawing) return;
    const r = parseInt(this.dataset.r), c = parseInt(this.dataset.c);
    if (lastDrawnCell && lastDrawnCell.r === r && lastDrawnCell.c === c) return;
    lastDrawnCell = { r, c };
    const cell = grid[r][c];
    if (!cell.isStart && !cell.isEnd) {
      cell.wall = !cell.wall;
      getCellEl(r, c)?.classList.toggle('wall');
    }
  }

  function onCellMouseUp(e) {
    wallDrawing = false;
    lastDrawnCell = null;
  }

  /* ---------- 防止鼠标滑出网格后拖拽失效 ---------- */
  document.addEventListener('mouseup', function(e) {
    if (wallDrawing) { wallDrawing = false; lastDrawnCell = null; }
  });

  // 禁用右键菜单
  document.addEventListener('contextmenu', function(e) {
    if (e.target.closest('#grid-container')) e.preventDefault();
  });

  /* ---------- A* 算法 ---------- */
  function heuristic(a, b) { return Math.abs(a.r - b.r) + Math.abs(a.c - b.c); }

  async function startAStar() {
    if (isRunning) return;
    isRunning = true;
    document.getElementById('mazeStartBtn').disabled = true;
    // 清除旧搜索状态
    for (const row of grid) for (const cell of row) {
      cell.explored = false;
      cell.frontier = false;
      cell.path = false;
    }

    const openSet = [];
    const closedSet = new Set();
    const gScore = {};
    const fScore = {};
    const cameFrom = {};

    const key = (r,c) => r+','+c;
    const startKey = key(start.r, start.c);
    const endKey = key(end.r, end.c);

    gScore[startKey] = 0;
    fScore[startKey] = heuristic(start, end);
    openSet.push({ r: start.r, c: start.c, f: fScore[startKey] });

    while (openSet.length > 0) {
      if (!isRunning) { return; } // 被中断

      // 取 f 值最小的节点
      openSet.sort((a, b) => a.f - b.f);
      const current = openSet.shift();
      const ck = key(current.r, current.c);

      if (ck === endKey) {
        // 重建路径
        let cur = endKey;
        while (cur) {
          const [r, c] = cur.split(',').map(Number);
          if (grid[r][c].isStart || grid[r][c].isEnd) { cur = cameFrom[cur]; continue; }
          grid[r][c].path = true;
          getCellEl(r, c)?.classList.add('path');
          cur = cameFrom[cur];
        }
        isRunning = false;
        document.getElementById('mazeStartBtn').disabled = false;
        return;
      }

      closedSet.add(ck);
      grid[current.r][current.c].explored = true;
      getCellEl(current.r, current.c)?.classList.add('explored');

      // 邻居
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (const [dr, dc] of dirs) {
        const nr = current.r + dr, nc = current.c + dc;
        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
        const nk = key(nr, nc);
        if (closedSet.has(nk)) continue;
        if (grid[nr][nc].wall) continue;
        const tentativeG = gScore[ck] + 1;
        if (tentativeG < (gScore[nk] ?? Infinity)) {
          cameFrom[nk] = ck;
          gScore[nk] = tentativeG;
          fScore[nk] = tentativeG + heuristic({r:nr,c:nc}, end);
          // 标记 frontier
          grid[nr][nc].frontier = true;
          getCellEl(nr, nc)?.classList.add('frontier');
          // 避免重复加入
          if (!openSet.find(n => n.r === nr && n.c === nc)) {
            openSet.push({ r: nr, c: nc, f: fScore[nk] });
          }
        }
      }

      // 让出主线程，实现肉眼可见的搜索动画
      await sleep(8);
    }

    // 无路径
    isRunning = false;
    document.getElementById('mazeStartBtn').disabled = false;
  }

  /* ---------- 生命周期 ---------- */
  M4.init = function() {
    gridContainer = document.getElementById('grid-container');
    createGrid();
    renderGrid();
    // 计算格子尺寸
    const containerWidth = gridContainer.parentElement.clientWidth - 40;
    const size = Math.min(Math.floor((containerWidth) / COLS), 22);
    gridContainer.style.gridTemplateColumns = 'repeat('+COLS+', '+size+'px)';
    gridContainer.querySelectorAll('.grid-cell').forEach(el => {
      el.style.width = size + 'px';
      el.style.height = size + 'px';
    });
    // 按钮事件
    document.getElementById('mazeStartBtn').addEventListener('click', startAStar);
    document.getElementById('mazeClearBtn').addEventListener('click', clearWalls);
    document.getElementById('mazeResetBtn').addEventListener('click', resetAll);
  };

  M4.pause = function() {
    isRunning = false;
  };

  M4.resume = function() {
    // 无需额外操作
  };

  Lifecycle.register('4', M4);
})();

/* ===================================================================
   模块5: 自定义视频播放器
   - 隐藏原生控件，自定义 UI
   - 可拖拽进度条，切断 timeupdate 抢控制权
   - 窗口级鼠标事件防滑出
   - 全屏切换
   =================================================================== */
(function() {
  const M5 = {};
  let video, playBtn, progressPlayed, progressThumb, progressContainer;
  let timeDisplay, volumeSlider, muteBtn, fullscreenBtn, progressBuffered, progressPreview;
  let isDraggingProgress = false;
  let suppressTimeUpdate = false;

  /* ---------- 格式化时间 ---------- */
  function formatTime(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  /* ---------- 进度条更新 ---------- */
  function updateProgress() {
    if (!video.duration || isDraggingProgress) return;
    const pct = (video.currentTime / video.duration) * 100 || 0;
    progressPlayed.style.width = pct + '%';
    progressThumb.style.left = pct + '%';
  }

  /* ---------- 进度条拖拽（窗口级事件防滑出） ---------- */
  function onProgressMouseDown(e) {
    if (!video.duration) return;
    isDraggingProgress = true;
    suppressTimeUpdate = true;
    // 创建预览 video
    const previewVideo = progressPreview.querySelector('video');
    previewVideo.src = video.currentSrc || video.src;
    previewVideo.preload = 'auto';
    progressPreview.style.display = 'block';
    seekFromEvent(e);
    e.preventDefault();
  }

  function onWindowMouseMove(e) {
    if (!isDraggingProgress) return;
    seekFromEvent(e);
  }

  function onWindowMouseUp(e) {
    if (!isDraggingProgress) return;
    isDraggingProgress = false;
    progressPreview.style.display = 'none';
    // 释放预览 video
    const previewVideo = progressPreview.querySelector('video');
    previewVideo.removeAttribute('src');
    suppressTimeUpdate = false;
    // 最终同步
    updateProgress();
  }

  function seekFromEvent(e) {
    const rect = progressContainer.getBoundingClientRect();
    let pct = (e.clientX - rect.left) / rect.width;
    pct = Math.max(0, Math.min(1, pct));
    const time = pct * video.duration;
    video.currentTime = time;
    progressPlayed.style.width = (pct * 100) + '%';
    progressThumb.style.left = (pct * 100) + '%';
    // 帧预览 - 显示当前帧
    const previewVideo = progressPreview.querySelector('video');
    if (previewVideo && previewVideo.readyState >= 2) {
      previewVideo.currentTime = time;
    }
    // 预览位置
    const previewW = 160;
    let left = e.clientX - rect.left;
    left = Math.max(previewW/2, Math.min(rect.width - previewW/2, left));
    progressPreview.style.left = left + 'px';
    // 更新时间显示
    timeDisplay.textContent = formatTime(time) + ' / ' + formatTime(video.duration);
  }

  /* ---------- 获取已缓冲 ---------- */
  function updateBuffered() {
    if (!video.duration) return;
    const b = video.buffered;
    if (b.length > 0) {
      const end = b.end(b.length - 1);
      progressBuffered.style.width = (end / video.duration * 100) + '%';
    }
  }

  /* ---------- 生命周期 ---------- */
  M5.init = function() {
    video = document.getElementById('player-video');
    playBtn = document.getElementById('playBtn');
    progressPlayed = document.getElementById('progress-played');
    progressThumb = document.getElementById('progress-thumb');
    progressContainer = document.getElementById('progress-container');
    timeDisplay = document.getElementById('time-display');
    volumeSlider = document.getElementById('volume-slider');
    muteBtn = document.getElementById('muteBtn');
    fullscreenBtn = document.getElementById('fullscreenBtn');
    progressBuffered = document.getElementById('progress-buffered');
    progressPreview = document.getElementById('progress-preview');

    video.controls = false;

    // 播放/暂停
    playBtn.addEventListener('click', function() {
      if (video.paused) {
        video.play().catch(()=>{});
        playBtn.textContent = '⏸';
      } else {
        video.pause();
        playBtn.textContent = '▶';
      }
    });

    video.addEventListener('play', function() { playBtn.textContent = '⏸'; });
    video.addEventListener('pause', function() { playBtn.textContent = '▶'; });

    // timeupdate - 有 supression 标志时不更新 UI，防止抢控制权
    video.addEventListener('timeupdate', function() {
      if (!suppressTimeUpdate) {
        updateProgress();
        timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
      }
      updateBuffered();
    });

    video.addEventListener('loadedmetadata', function() {
      timeDisplay.textContent = '0:00 / ' + formatTime(video.duration);
      updateBuffered();
    });

    video.addEventListener('progress', updateBuffered);

    // 进度条事件
    progressContainer.addEventListener('mousedown', onProgressMouseDown);
    window.addEventListener('mousemove', onWindowMouseMove);
    window.addEventListener('mouseup', onWindowMouseUp);

    // 点击进度条跳转（非拖拽）
    progressContainer.addEventListener('click', function(e) {
      if (isDraggingProgress) return;
      if (!video.duration) return;
      const rect = this.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      video.currentTime = pct * video.duration;
    });

    // 音量
    volumeSlider.addEventListener('input', function() {
      video.volume = parseFloat(this.value);
      video.muted = false;
      muteBtn.textContent = video.volume === 0 ? '🔇' : video.volume < 0.5 ? '🔉' : '🔊';
    });

    muteBtn.addEventListener('click', function() {
      video.muted = !video.muted;
      muteBtn.textContent = video.muted ? '🔇' : video.volume === 0 ? '🔇' : video.volume < 0.5 ? '🔉' : '🔊';
      if (!video.muted) volumeSlider.value = video.volume;
    });

    // 全屏
    fullscreenBtn.addEventListener('click', function() {
      const pc = document.getElementById('player-container');
      if (!document.fullscreenElement) {
        pc.requestFullscreen().catch(()=>{});
        fullscreenBtn.textContent = '⛶';
      } else {
        document.exitFullscreen().catch(()=>{});
        fullscreenBtn.textContent = '⛶';
      }
    });

    document.addEventListener('fullscreenchange', function() {
      fullscreenBtn.textContent = document.fullscreenElement ? '⛶' : '⛶';
    });
  };

  M5.pause = function() {
    if (video && !video.paused) video.pause();
    if (playBtn) playBtn.textContent = '▶';
  };

  M5.resume = function() {
    // 不做自动播放，让用户手动点播放
    updateProgress();
    if (video && video.duration) {
      timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
    }
  };

  Lifecycle.register('5', M5);
})();

/* ===================================================================
   初始化: 标签页切换 + 默认加载模块1
   =================================================================== */
(function() {
  // 标签页点击事件
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const tabId = this.dataset.tab;
      Lifecycle.switchTab(tabId);
    });
  });

  // 默认启动模块1
  Lifecycle.switchTab('1');
})();
</script>
</body>
