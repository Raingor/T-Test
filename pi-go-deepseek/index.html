<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>前端可视化仪表盘 · 5 合 1</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  /* ===== 全局重置 & 布局 ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
  body { background: #0f172a; color: #e2e8f0; }

  #app { display: flex; height: 100vh; width: 100vw; }

  /* ===== 侧边栏导航 ===== */
  .sidebar {
    width: 84px; min-width: 84px;
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    border-right: 1px solid rgba(148,163,184,0.12);
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 0; gap: 4px; z-index: 10;
  }
  .sidebar-brand {
    font-size: 18px; font-weight: 700; letter-spacing: -0.5px;
    color: #38bdf8; margin-bottom: 16px;
  }
  .tab-btn {
    width: 68px; height: 68px; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; cursor: pointer; transition: all 0.2s;
    border: none; background: transparent; color: #64748b;
    font-size: 10px; line-height: 1.2;
  }
  .tab-btn:hover { background: rgba(56,189,248,0.08); color: #94a3b8; }
  .tab-btn.active {
    background: rgba(56,189,248,0.15); color: #38bdf8;
    box-shadow: inset 0 0 0 1px rgba(56,189,248,0.25);
  }
  .tab-btn .icon { font-size: 22px; }
  .tab-btn .label { font-weight: 500; }

  /* ===== 主内容区 ===== */
  .main-content {
    flex: 1; overflow: hidden; position: relative;
    background: #0f172a;
  }
  .tab-panel {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    padding: 20px; opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .tab-panel.active { opacity: 1; pointer-events: auto; }
  .tab-panel.hidden { display: none; opacity: 0; pointer-events: none; }

  .panel-header { margin-bottom: 16px; }
  .panel-header h2 { font-size: 20px; font-weight: 600; color: #f1f5f9; }
  .panel-header p { font-size: 13px; color: #64748b; margin-top: 2px; }

  .panel-body {
    flex: 1; background: #1e293b; border-radius: 12px;
    border: 1px solid rgba(148,163,184,0.1); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  /* ===== Module 1: Canvas ===== */
  #particles-canvas { display: block; width: 100%; height: 100%; }

  /* ===== Module 2: Kanban ===== */
  .kanban-board { display: flex; gap: 16px; padding: 16px; width: 100%; height: 100%; }
  .kanban-col {
    flex: 1; background: #0f172a; border-radius: 10px;
    display: flex; flex-direction: column; overflow: hidden;
    border: 2px solid transparent; transition: border-color 0.15s;
  }
  .kanban-col.drag-over { border-color: #38bdf8; background: rgba(56,189,248,0.05); }
  .kanban-col-header {
    padding: 12px 14px; font-weight: 600; font-size: 14px;
    border-bottom: 1px solid rgba(148,163,184,0.08);
    display: flex; justify-content: space-between; align-items: center;
  }
  .kanban-col-header .count {
    background: rgba(148,163,184,0.12); border-radius: 999px;
    padding: 2px 10px; font-size: 12px; color: #94a3b8;
  }
  .kanban-col-body {
    flex: 1; overflow-y: auto; padding: 8px;
    display: flex; flex-direction: column; gap: 6px;
    min-height: 80px;
  }
  .kanban-card {
    background: #1e293b; border-radius: 8px; padding: 10px 12px;
    cursor: grab; font-size: 13px; line-height: 1.4;
    border: 1px solid rgba(148,163,184,0.08);
    transition: transform 0.1s, box-shadow 0.1s;
    user-select: none;
  }
  .kanban-card:active { cursor: grabbing; }
  .kanban-card.dragging { opacity: 0.4; }
  .kanban-card.drag-over { transform: translateY(4px); }
  .kanban-add-btn {
    padding: 8px; text-align: center; color: #64748b; font-size: 13px;
    cursor: pointer; border-radius: 6px; transition: background 0.15s;
  }
  .kanban-add-btn:hover { background: rgba(148,163,184,0.08); color: #94a3b8; }

  /* ===== Module 3: SVG Ticker ===== */
  #ticker-svg { width: 100%; height: 100%; }
  #ticker-svg path { fill: none; stroke-linejoin: round; stroke-linecap: round; }

  /* ===== Module 4: Pathfinding ===== */
  .pf-container { display: flex; flex-direction: column; width: 100%; height: 100%; }
  .pf-toolbar {
    display: flex; gap: 10px; padding: 12px 16px;
    border-bottom: 1px solid rgba(148,163,184,0.08);
    align-items: center; flex-wrap: wrap;
  }
  .pf-toolbar .status { font-size: 13px; color: #94a3b8; flex: 1; }
  .pf-btn {
    padding: 6px 16px; border-radius: 6px; border: none;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.15s;
  }
  .pf-btn-primary { background: #38bdf8; color: #0f172a; }
  .pf-btn-primary:hover { background: #7dd3fc; }
  .pf-btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .pf-btn-secondary { background: rgba(148,163,184,0.12); color: #94a3b8; }
  .pf-btn-secondary:hover { background: rgba(148,163,184,0.2); color: #cbd5e1; }
  .pf-btn-danger { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .pf-btn-danger:hover { background: rgba(239,68,68,0.25); color: #fecaca; }
  .pf-speed-label { font-size: 12px; color: #64748b; }
  .pf-speed-input { width: 80px; }
  .pf-grid-wrapper {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 16px; overflow: hidden;
  }
  .pf-grid {
    display: grid; gap: 1px; background: #334155;
    border: 1px solid #334155;
  }
  .pf-cell {
    background: #1e293b; cursor: pointer; position: relative;
    transition: background 0.08s;
  }
  .pf-cell.wall { background: #475569; }
  .pf-cell.start { background: #22c55e; }
  .pf-cell.end { background: #ef4444; }
  .pf-cell.visited { background: #1d4ed8; }
  .pf-cell.explored { background: #3b82f6; }
  .pf-cell.path { background: #eab308; }
  .pf-cell.start::after {
    content: 'S'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #052e16;
  }
  .pf-cell.end::after {
    content: 'E'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #450a0a;
  }

  /* ===== Module 5: Video Player ===== */
  .vp-container { display: flex; flex-direction: column; width: 100%; height: 100%; background: #000; }
  .vp-video-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .vp-video-wrap video { width: 100%; height: 100%; object-fit: contain; }
  .vp-controls {
    padding: 10px 16px; background: rgba(15,23,42,0.95);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    border-top: 1px solid rgba(148,163,184,0.1);
  }
  .vp-btn {
    background: none; border: none; color: #94a3b8; cursor: pointer;
    font-size: 18px; padding: 4px; border-radius: 4px;
    transition: color 0.15s; line-height: 1;
  }
  .vp-btn:hover { color: #38bdf8; }
  .vp-time { font-size: 13px; color: #64748b; font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 100px; }
  .vp-progress-wrap {
    flex: 1; height: 6px; background: #334155; border-radius: 3px;
    cursor: pointer; position: relative; min-width: 80px;
  }
  .vp-progress-fill {
    height: 100%; background: linear-gradient(90deg, #38bdf8, #818cf8);
    border-radius: 3px; width: 0%; pointer-events: none;
    transition: width 0.05s linear;
  }
  .vp-progress-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: #38bdf8; position: absolute; top: 50%;
    transform: translate(-50%, -50%); left: 0%;
    pointer-events: none; box-shadow: 0 0 6px rgba(56,189,248,0.4);
  }
  .vp-volume-wrap { display: flex; align-items: center; gap: 6px; }
  .vp-volume-wrap input[type="range"] {
    width: 80px; height: 4px; -webkit-appearance: none; appearance: none;
    background: #334155; border-radius: 2px; outline: none;
  }
  .vp-volume-wrap input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: #38bdf8; cursor: pointer;
  }

  /* ===== 滚动条 ===== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

  /* ===== 响应式 ===== */
  @media (max-width: 640px) {
    .sidebar { width: 64px; min-width: 64px; padding: 12px 0; }
    .tab-btn { width: 52px; height: 56px; font-size: 9px; }
    .tab-btn .icon { font-size: 18px; }
    .panel-body { border-radius: 8px; }
    .tab-panel { padding: 12px; }
    .kanban-board { flex-direction: column; gap: 10px; padding: 10px; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- ===== 侧边栏导航 ===== -->
  <nav class="sidebar">
    <div class="sidebar-brand">✦</div>
    <button class="tab-btn active" data-tab="0" title="粒子物理">
      <span class="icon">🌐</span><span class="label">粒子</span>
    </button>
    <button class="tab-btn" data-tab="1" title="拖拽看板">
      <span class="icon">📋</span><span class="label">看板</span>
    </button>
    <button class="tab-btn" data-tab="2" title="实时折线">
      <span class="icon">📈</span><span class="label">折线</span>
    </button>
    <button class="tab-btn" data-tab="3" title="寻路迷宫">
      <span class="icon">🧩</span><span class="label">迷宫</span>
    </button>
    <button class="tab-btn" data-tab="4" title="视频播放器">
      <span class="icon">🎬</span><span class="label">播放器</span>
    </button>
  </nav>

  <!-- ===== 主内容区 ===== -->
  <main class="main-content">

    <!-- ===== Tab 0: 粒子物理 ===== -->
    <div class="tab-panel active" data-tab="0">
      <div class="panel-header">
        <h2>🌐 引力弹球模拟器</h2>
        <p>500 粒子 · 中心引力 · 弹性碰撞 · 空间哈希优化</p>
      </div>
      <div class="panel-body">
        <canvas id="particles-canvas"></canvas>
      </div>
    </div>

    <!-- ===== Tab 1: 拖拽看板 ===== -->
    <div class="tab-panel hidden" data-tab="1">
      <div class="panel-header">
        <h2>📋 任务看板</h2>
        <p>原生 HTML5 Drag & Drop · localStorage 持久化</p>
      </div>
      <div class="panel-body" style="padding:0;display:block;">
        <div class="kanban-board" id="kanban-board"></div>
      </div>
    </div>

    <!-- ===== Tab 2: 实时折线 ===== -->
    <div class="tab-panel hidden" data-tab="2">
      <div class="panel-header">
        <h2>📈 实时行情折线</h2>
        <p>纯 SVG · 单 Path · 50 点滑动窗口 · 自动缩放 Y 轴</p>
      </div>
      <div class="panel-body" style="padding:12px;">
        <svg id="ticker-svg" viewBox="0 0 800 400" preserveAspectRatio="none"></svg>
      </div>
    </div>

    <!-- ===== Tab 3: 寻路迷宫 ===== -->
    <div class="tab-panel hidden" data-tab="3">
      <div class="panel-header">
        <h2>🧩 A* 寻路可视化</h2>
        <p>30×30 网格 · 点击设起点/终点 · 拖拽画墙 · 异步动画</p>
      </div>
      <div class="panel-body" style="padding:0;display:block;">
        <div class="pf-container">
          <div class="pf-toolbar">
            <span class="status" id="pf-status">点击网格设置起点 (S)，再设终点 (E)，然后拖拽画墙</span>
            <button class="pf-btn pf-btn-primary" id="pf-start-btn">▶ 开始寻路</button>
            <button class="pf-btn pf-btn-danger" id="pf-clear-btn">✕ 清除</button>
            <button class="pf-btn pf-btn-secondary" id="pf-reset-btn">↻ 重置网格</button>
            <span class="pf-speed-label">速度</span>
            <input type="range" class="pf-speed-input" id="pf-speed" min="1" max="10" value="5">
          </div>
          <div class="pf-grid-wrapper">
            <div class="pf-grid" id="pf-grid"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Tab 4: 视频播放器 ===== -->
    <div class="tab-panel hidden" data-tab="4">
      <div class="panel-header">
        <h2>🎬 自定义视频播放器</h2>
        <p>全手写控件 · 可拖拽进度条 · 拖拽时帧预览</p>
      </div>
      <div class="panel-body" style="padding:0;display:block;background:#000;">
        <div class="vp-container">
          <div class="vp-video-wrap">
            <video id="vp-video" preload="metadata" playsinline></video>
          </div>
          <div class="vp-controls" id="vp-controls">
            <button class="vp-btn" id="vp-play-btn">▶</button>
            <span class="vp-time" id="vp-time">00:00 / 00:00</span>
            <div class="vp-progress-wrap" id="vp-progress-wrap">
              <div class="vp-progress-fill" id="vp-progress-fill"></div>
              <div class="vp-progress-thumb" id="vp-progress-thumb"></div>
            </div>
            <div class="vp-volume-wrap">
              <button class="vp-btn" id="vp-mute-btn">🔊</button>
              <input type="range" id="vp-volume" min="0" max="1" step="0.05" value="1">
            </div>
            <button class="vp-btn" id="vp-fullscreen-btn">⛶</button>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
'use strict';

// ================================================================
// 工具函数
// ================================================================

/** 睡眠（用于异步循环挂起） */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/** 生成唯一 ID */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

/** 限制数值范围 */
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// ================================================================
// TAB 切换系统 + 生命周期管理
// ================================================================

const MODULES = [
  { name: 'particles', init: null, destroy: null },
  { name: 'kanban',    init: null, destroy: null },
  { name: 'ticker',    init: null, destroy: null },
  { name: 'pathfind',  init: null, destroy: null },
  { name: 'player',    init: null, destroy: null },
];

let currentTab = 0;

function switchTab(index) {
  if (index === currentTab) return;

  // 销毁当前模块
  if (MODULES[currentTab].destroy) MODULES[currentTab].destroy();

  // 切换面板 DOM 显示
  document.querySelectorAll('.tab-panel').forEach((el, i) => {
    el.classList.toggle('active', i === index);
    el.classList.toggle('hidden', i !== index);
  });

  // 切换按钮状态
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  currentTab = index;

  // 初始化新模块
  if (MODULES[index].init) MODULES[index].init();
}

// Tab 按钮事件绑定
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(parseInt(btn.dataset.tab)));
});


// ================================================================
// MODULE 1: 引力弹球模拟器 (Canvas + Spatial Hash Grid)
// ================================================================

(function() {
  let canvas, ctx;
  let particles = [];
  let spatialHash;
  let animId = null;
  let active = false;
  let W, H;
  const PARTICLE_COUNT = 500;
  const G = 800;          // 引力常数
  const MAX_RADIUS = 7;
  const MIN_RADIUS = 2;
  const CELL_SIZE = 16;   // 空间哈希单元格大小

  /** 粒子类 */
  class Particle {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.radius = MIN_RADIUS + Math.random() * (MAX_RADIUS - MIN_RADIUS);
      this.mass = this.radius * this.radius; // 质量正比于面积
      const hue = Math.random() * 360;
      this.color = `hsl(${hue}, 80%, 60%)`;
      this.glow = `hsla(${hue}, 80%, 60%, 0.15)`;
      // 初始速度：随机环绕方向
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 80;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
    }
  }

  /** 空间哈希网格（空间划分优化，消除 O(n²)） */
  class SpatialHash {
    constructor(cellSize) {
      this.cellSize = cellSize;
      this.grid = new Map();
    }
    clear() { this.grid.clear(); }
    _key(x, y) {
      return `${Math.floor(x / this.cellSize)},${Math.floor(y / this.cellSize)}`;
    }
    insert(p) {
      const k = this._key(p.x, p.y);
      if (!this.grid.has(k)) this.grid.set(k, []);
      this.grid.get(k).push(p);
    }
    /** 获取粒子所在单元格及相邻共 9 格的所有粒子 */
    getNeighbors(p) {
      const cx = Math.floor(p.x / this.cellSize);
      const cy = Math.floor(p.y / this.cellSize);
      const result = [];
      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          const k = `${cx + dx},${cy + dy}`;
          const bucket = this.grid.get(k);
          if (bucket) {
            for (let i = 0; i < bucket.length; i++) {
              if (bucket[i] !== p) result.push(bucket[i]);
            }
          }
        }
      }
      return result;
    }
  }

  /** 弹性碰撞解析 + 重叠修正（防粒子挤压抖动） */
  function resolveCollision(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minDist = a.radius + b.radius;
    if (dist === 0 || dist > minDist) return;

    const nx = dx / dist;
    const ny = dy / dist;

    // 重叠修正（Position Correction）
    const overlap = (minDist - dist) / 2;
    a.x -= overlap * nx;
    a.y -= overlap * ny;
    b.x += overlap * nx;
    b.y += overlap * ny;

    // 相对速度沿法线分量
    const dvx = a.vx - b.vx;
    const dvy = a.vy - b.vy;
    const dvn = dvx * nx + dvy * ny;
    if (dvn > 0) return; // 正在分离，无需处理

    // 弹性碰撞冲量（恢复系数 0.85）
    const e = 0.85;
    const j = -(1 + e) * dvn / (1 / a.mass + 1 / b.mass);

    a.vx += j * nx / a.mass;
    a.vy += j * ny / a.mass;
    b.vx -= j * nx / b.mass;
    b.vy -= j * ny / b.mass;
  }

  /** 更新画布尺寸（支持 Retina 高清屏） */
  function resize() {
    if (!canvas) return;
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    W = rect.width;
    H = rect.height;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  /** 初始化粒子 */
  function createParticles(count) {
    particles = [];
    for (let i = 0; i < count; i++) {
      // 避开中心区域生成，营造从四周被吸引的效果
      let x, y;
      do {
        x = Math.random() * W;
        y = Math.random() * H;
      } while (Math.hypot(x - W / 2, y - H / 2) < 100);
      particles.push(new Particle(x, y));
    }
  }

  /** 主渲染循环 */
  function loop(timestamp) {
    if (!active) return;
    animId = requestAnimationFrame(loop);

    const cx = W / 2, cy = H / 2;

    // ---- 1) 空间哈希 ----
    spatialHash.clear();
    for (let i = 0; i < particles.length; i++) {
      spatialHash.insert(particles[i]);
    }

    // ---- 2) 物理更新 ----
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];

      // 中心引力
      const dxc = cx - p.x;
      const dyc = cy - p.y;
      const distC = Math.hypot(dxc, dyc) || 1;
      // 万有引力 F = G * m / r²（加软化因子防奇点）
      const force = G * p.mass / (distC * distC + 50);
      const fxn = dxc / distC * force;
      const fyn = dyc / distC * force;
      p.vx += fxn;
      p.vy += fyn;

      // 碰撞检测（通过空间哈希邻居加速）
      const neighbors = spatialHash.getNeighbors(p);
      for (let j = 0; j < neighbors.length; j++) {
        resolveCollision(p, neighbors[j]);
      }
    }

    // ---- 3) 位置更新 & 边界反弹 ----
    const margin = 20;
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.x += p.vx * 0.016;
      p.y += p.vy * 0.016;

      // 边界反弹（带能量损耗）
      if (p.x - p.radius < 0) { p.x = p.radius; p.vx *= -0.85; }
      if (p.x + p.radius > W) { p.x = W - p.radius; p.vx *= -0.85; }
      if (p.y - p.radius < 0) { p.y = p.radius; p.vy *= -0.85; }
      if (p.y + p.radius > H) { p.y = H - p.radius; p.vy *= -0.85; }
    }

    // ---- 4) 渲染 ----
    ctx.clearRect(0, 0, W, H);

    // 中心引力源光晕
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
    grad.addColorStop(0, 'rgba(56,189,248,0.08)');
    grad.addColorStop(1, 'rgba(56,189,248,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, 80, 0, Math.PI * 2);
    ctx.fill();

    // 渲染粒子
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      // 光晕
      ctx.shadowColor = p.glow;
      ctx.shadowBlur = 6;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  // ---- 生命周期 ----
  MODULES[0].init = function() {
    if (active) return;
    active = true;
    canvas = document.getElementById('particles-canvas');
    ctx = canvas.getContext('2d');

    resize();
    spatialHash = new SpatialHash(CELL_SIZE);
    createParticles(PARTICLE_COUNT);
    loop();

    window.addEventListener('resize', onResize);
  };

  function onResize() {
    resize();
  }

  MODULES[0].destroy = function() {
    active = false;
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    window.removeEventListener('resize', onResize);
    canvas = null;
    ctx = null;
    particles = [];
  };
})();


// ================================================================
// MODULE 2: 纯原生拖拽看板 (HTML5 Drag & Drop)
// ================================================================

(function() {
  let boardEl;
  let boardData;
  let dragSrcId = null;

  const STORAGE_KEY = 'kanban-board-data';
  const COLUMN_IDS = ['todo', 'inprogress', 'done'];
  const COLUMN_TITLES = { todo: '待办', inprogress: '进行中', done: '已完成' };
  const COLUMN_COLORS = { todo: '#3b82f6', inprogress: '#eab308', done: '#22c55e' };
  const DEFAULT_CARDS = {
    todo: [
      { id: uid(), text: '设计系统架构' },
      { id: uid(), text: '编写 API 文档' },
      { id: uid(), text: '配置 CI/CD 流水线' },
      { id: uid(), text: '评审代码规范' },
    ],
    inprogress: [
      { id: uid(), text: '实现用户认证模块' },
      { id: uid(), text: '前端页面重构' },
    ],
    done: [
      { id: uid(), text: '项目初始化' },
      { id: uid(), text: '技术选型调研' },
    ]
  };

  /** 加载或初始化数据 */
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        boardData = JSON.parse(raw);
        // 验证结构完整性
        for (const cid of COLUMN_IDS) {
          if (!boardData[cid] || !Array.isArray(boardData[cid])) {
            boardData[cid] = [];
          }
        }
        return;
      }
    } catch (e) { /* ignore */ }
    boardData = JSON.parse(JSON.stringify(DEFAULT_CARDS));
    saveData();
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(boardData));
  }

  /** 渲染整个看板 */
  function render() {
    boardEl.innerHTML = '';
    for (const cid of COLUMN_IDS) {
      const col = document.createElement('div');
      col.className = 'kanban-col';
      col.dataset.col = cid;

      // 列头
      const header = document.createElement('div');
      header.className = 'kanban-col-header';
      header.style.color = COLUMN_COLORS[cid];
      header.innerHTML = `
        <span>${COLUMN_TITLES[cid]}</span>
        <span class="count">${boardData[cid].length}</span>
      `;

      const body = document.createElement('div');
      body.className = 'kanban-col-body';
      body.dataset.col = cid;

      // 渲染卡片
      for (const card of boardData[cid]) {
        body.appendChild(createCardEl(card));
      }

      // 添加卡片按钮
      const addBtn = document.createElement('div');
      addBtn.className = 'kanban-add-btn';
      addBtn.textContent = '+ 添加卡片';
      addBtn.addEventListener('click', () => addCard(cid));

      col.appendChild(header);
      col.appendChild(body);
      col.appendChild(addBtn);

      // ---- 拖拽事件（列级别）- ----
      let dropCounter = 0;

      col.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dropCounter++;
        if (dropCounter === 1) {
          col.classList.add('drag-over');
        }
      });

      col.addEventListener('dragover', (e) => {
        e.preventDefault();
        // 当拖着卡片经过其他卡片时，显示插入位置
        const targetCard = e.target.closest('.kanban-card');
        if (targetCard && targetCard.dataset.id !== dragSrcId) {
          body.querySelectorAll('.kanban-card').forEach(el => el.classList.remove('drag-over'));
          targetCard.classList.add('drag-over');
        }
      });

      col.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropCounter--;
        if (dropCounter <= 0) {
          dropCounter = 0;
          col.classList.remove('drag-over');
          body.querySelectorAll('.kanban-card').forEach(el => el.classList.remove('drag-over'));
        }
      });

      col.addEventListener('drop', (e) => {
        e.preventDefault();
        dropCounter = 0;
        col.classList.remove('drag-over');
        body.querySelectorAll('.kanban-card').forEach(el => el.classList.remove('drag-over'));

        if (!dragSrcId) return;

        const targetCol = col.dataset.col;
        const targetCard = e.target.closest('.kanban-card');
        let targetIdx = targetCard ? boardData[targetCol].findIndex(c => c.id === targetCard.dataset.id) : -1;
        if (targetIdx < 0) targetIdx = boardData[targetCol].length;

        // 从源列移除
        let srcCol = null;
        let srcIdx = -1;
        let movedCard = null;
        for (const cid of COLUMN_IDS) {
          const idx = boardData[cid].findIndex(c => c.id === dragSrcId);
          if (idx >= 0) {
            srcCol = cid;
            srcIdx = idx;
            movedCard = boardData[cid].splice(idx, 1)[0];
            break;
          }
        }
        if (!movedCard) return;

        // 如果同列且拖到自身移除后的位置，修正索引
        if (srcCol === targetCol && srcIdx < targetIdx) {
          targetIdx = Math.max(0, targetIdx - 1);
        }

        boardData[targetCol].splice(targetIdx, 0, movedCard);
        saveData();
        render();
        dragSrcId = null;
      });

      boardEl.appendChild(col);
    }
  }

  /** 创建卡片 DOM 元素 */
  function createCardEl(card) {
    const el = document.createElement('div');
    el.className = 'kanban-card';
    el.draggable = true;
    el.dataset.id = card.id;
    el.textContent = card.text;

    el.addEventListener('dragstart', (e) => {
      dragSrcId = card.id;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.id);
    });

    el.addEventListener('dragend', (e) => {
      document.querySelectorAll('.kanban-card').forEach(el => el.classList.remove('dragging', 'drag-over'));
      document.querySelectorAll('.kanban-col').forEach(el => el.classList.remove('drag-over'));
    });

    // 双击删除
    el.addEventListener('dblclick', () => {
      for (const cid of COLUMN_IDS) {
        const idx = boardData[cid].findIndex(c => c.id === card.id);
        if (idx >= 0) {
          boardData[cid].splice(idx, 1);
          saveData();
          render();
          break;
        }
      }
    });

    return el;
  }

  /** 添加卡片 */
  function addCard(colId) {
    const text = prompt('请输入任务内容：');
    if (!text || !text.trim()) return;
    boardData[colId].push({ id: uid(), text: text.trim() });
    saveData();
    render();
  }

  // ---- 生命周期 ----
  MODULES[1].init = function() {
    boardEl = document.getElementById('kanban-board');
    loadData();
    render();
  };

  MODULES[1].destroy = function() {
    boardEl = null;
    dragSrcId = null;
  };
})();


// ================================================================
// MODULE 3: 纯 SVG 实时心电图折线
// ================================================================

(function() {
  let svg, pathEl;
  let data = [];
  let intervalId = null;
  let active = false;
  const MAX_POINTS = 50;
  const INTERVAL_MS = 100;
  const PADDING = 40;

  /** 生成模拟数据点（随机游走） */
  let lastVal = 50;
  function generatePoint() {
    lastVal += (Math.random() - 0.5) * 12;
    lastVal = clamp(lastVal, 5, 95);
    return lastVal;
  }

  /** 更新 SVG 路径 d 属性（始终只维护一条 <path>） */
  function updateChart() {
    if (!active || data.length < 2) return;

    const rect = svg.parentElement.getBoundingClientRect();
    const width = rect.width - PADDING * 2;
    const height = rect.height - PADDING * 2;
    if (width <= 0 || height <= 0) return;

    // Y 轴自动缩放（根据当前 50 个点的极值）
    let min = Infinity, max = -Infinity;
    for (let i = 0; i < data.length; i++) {
      if (data[i] < min) min = data[i];
      if (data[i] > max) max = data[i];
    }
    const range = max - min || 1;
    // 上下各扩展 15% 留白，防止贴边
    const padRange = range * 0.15;
    min -= padRange;
    max += padRange;
    const scaleRange = max - min || 1;

    // 构建 Path d 属性：M x0,y0 L x1,y1 L x2,y2 ...
    let d = '';
    for (let i = 0; i < data.length; i++) {
      const x = PADDING + (i / (data.length - 1)) * width;
      const y = PADDING + height - ((data[i] - min) / scaleRange) * height;
      d += (i === 0 ? 'M' : ' L') + x.toFixed(1) + ',' + y.toFixed(1);
    }
    pathEl.setAttribute('d', d);

    // 更新 viewBox 以匹配实际尺寸
    svg.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
  }

  /** 定时器回调：推新点 + 更新图表 */
  function tick() {
    if (!active) return;
    data.push(generatePoint());
    if (data.length > MAX_POINTS) {
      data.shift(); // 移除最旧的点，维持滑动窗口
    }
    updateChart();
  }

  // ---- 生命周期 ----
  MODULES[2].init = function() {
    if (active) return;
    active = true;
    svg = document.getElementById('ticker-svg');
    pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    pathEl.setAttribute('stroke', '#38bdf8');
    pathEl.setAttribute('stroke-width', '2.5');
    pathEl.setAttribute('filter', 'url(#glow)');
    svg.innerHTML = '';
    // 滤镜：发光效果
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.innerHTML = `
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    `;
    svg.appendChild(defs);
    svg.appendChild(pathEl);
    svg.style.background = 'transparent';

    // 填充初始数据
    data = [];
    lastVal = 50;
    for (let i = 0; i < MAX_POINTS; i++) {
      data.push(generatePoint());
    }

    // 延迟一帧确保布局完成
    requestAnimationFrame(() => {
      updateChart();
      intervalId = setInterval(tick, INTERVAL_MS);
    });

    window.addEventListener('resize', onResize3);
  };

  function onResize3() {
    if (active) updateChart();
  }

  MODULES[2].destroy = function() {
    active = false;
    if (intervalId) { clearInterval(intervalId); intervalId = null; }
    window.removeEventListener('resize', onResize3);
    svg = null;
    pathEl = null;
    data = [];
  };
})();


// ================================================================
// MODULE 4: A* 寻路可视化
// ================================================================

(function() {
  const ROWS = 30, COLS = 30;
  let grid = [];           // 2D: grid[row][col] = { row, col, isWall, isStart, isEnd }
  let gridEls = [];        // 2D DOM 引用
  let gridContainer;
  let statusEl, startBtn, clearBtn, resetBtn, speedInput;
  let startPos = null, endPos = null;
  let isRunning = false;
  let isDrawing = false;
  let mouseDownCell = null;

  // ---- 网格数据 ----
  function createEmptyGrid() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        grid[r][c] = { row: r, col: c, isWall: false, isStart: false, isEnd: false };
      }
    }
  }

  /** 重置网格（清除所有状态，保留 walls） */
  function resetVisuals() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = grid[r][c];
        cell.isStart = false;
        cell.isEnd = false;
        // isWall 保持不变
        updateCellDOM(r, c);
      }
    }
    startPos = null;
    endPos = null;
    updateStatus('点击网格设置起点 (S)，再设终点 (E)，然后拖拽画墙');
  }

  /** 清除全部（walls + 起点终点 + 搜索状态） */
  function clearAll() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        grid[r][c].isWall = false;
        grid[r][c].isStart = false;
        grid[r][c].isEnd = false;
        updateCellDOM(r, c);
      }
    }
    startPos = null;
    endPos = null;
    updateStatus('网格已清空');
  }

  /** 清除搜索状态（但保留 walls + start + end） */
  function clearSearchState() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = grid[r][c];
        if (!cell.isWall && !cell.isStart && !cell.isEnd) {
          gridEls[r][c].className = 'pf-cell';
        }
      }
    }
  }

  /** 更新单个单元格的 DOM 类名 */
  function updateCellDOM(r, c, extraClass) {
    if (!gridEls[r] || !gridEls[r][c]) return;
    const cell = grid[r][c];
    let cls = 'pf-cell';
    if (cell.isWall) cls += ' wall';
    if (cell.isStart) cls += ' start';
    if (cell.isEnd) cls += ' end';
    if (extraClass) cls += ' ' + extraClass;
    gridEls[r][c].className = cls;
  }

  /** 更新状态文本 */
  function updateStatus(msg) {
    if (statusEl) statusEl.textContent = msg;
  }

  // ---- 网格渲染 ----
  function renderGrid() {
    gridContainer = document.getElementById('pf-grid');
    gridContainer.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

    // 计算单元格尺寸
    const wrapper = gridContainer.parentElement;
    const maxW = wrapper.clientWidth - 32;
    const maxH = wrapper.clientHeight - 32;
    const cellSize = Math.min(Math.floor(maxW / COLS), Math.floor(maxH / ROWS));
    const gridW = cellSize * COLS + (COLS - 1);
    const gridH = cellSize * ROWS + (ROWS - 1);
    gridContainer.style.width = gridW + 'px';
    gridContainer.style.height = gridH + 'px';

    gridContainer.innerHTML = '';
    gridEls = [];

    for (let r = 0; r < ROWS; r++) {
      gridEls[r] = [];
      for (let c = 0; c < COLS; c++) {
        const el = document.createElement('div');
        el.className = 'pf-cell';
        el.style.width = cellSize + 'px';
        el.style.height = cellSize + 'px';
        el.dataset.row = r;
        el.dataset.col = c;
        gridContainer.appendChild(el);
        gridEls[r][c] = el;

        // ---- 鼠标事件 ----
        el.addEventListener('mousedown', (e) => {
          if (isRunning) return;
          e.preventDefault();
          const row = parseInt(el.dataset.row);
          const col = parseInt(el.dataset.col);
          mouseDownCell = { row, col };
          handleCellClick(row, col, e);
        });

        el.addEventListener('mouseenter', (e) => {
          if (isRunning) return;
          if (!mouseDownCell) return;
          const row = parseInt(el.dataset.row);
          const col = parseInt(el.dataset.col);
          handleCellDrag(row, col);
        });

        el.addEventListener('mouseup', () => {
          mouseDownCell = null;
          isDrawing = false;
        });
      }
    }

    // 全局 mouseup 停止拖拽绘画
    document.addEventListener('mouseup', () => {
      mouseDownCell = null;
      isDrawing = false;
    }, { passive: true });
  }

  /** 处理单元格点击：设置起点、终点、或墙 */
  function handleCellClick(row, col) {
    const cell = grid[row][col];
    if (cell.isWall) return;

    if (!startPos) {
      // 设置起点
      cell.isStart = true;
      startPos = { row, col };
      updateCellDOM(row, col);
      updateStatus('起点已设置，请点击终点 (E)');
      return;
    }

    if (!endPos && !(row === startPos.row && col === startPos.col)) {
      // 设置终点
      cell.isEnd = true;
      endPos = { row, col };
      updateCellDOM(row, col);
      updateStatus('终点已设置。拖拽画墙，或点击"开始寻路"');
      return;
    }

    // 已有起点和终点 → 切换墙壁
    if (row === startPos.row && col === startPos.col) return;
    if (row === endPos.row && col === endPos.col) return;
    cell.isWall = !cell.isWall;
    updateCellDOM(row, col);
    isDrawing = cell.isWall;
  }

  /** 处理拖拽画墙 */
  function handleCellDrag(row, col) {
    const cell = grid[row][col];
    if (cell.isStart || cell.isEnd) return;
    // 判断是画墙还是擦墙
    if (isDrawing) {
      cell.isWall = true;
    } else {
      cell.isWall = false;
    }
    updateCellDOM(row, col);
  }

  // ---- A* 算法（异步，步进可视化） ----
  async function runAStar() {
    if (!startPos || !endPos) {
      updateStatus('请先设置起点和终点！');
      return;
    }
    if (isRunning) return;
    isRunning = true;
    startBtn.disabled = true;

    clearSearchState();
    updateStatus('搜索中...');

    // 从网格重建可通行状态（墙不可通行）
    const passable = [];
    for (let r = 0; r < ROWS; r++) {
      passable[r] = [];
      for (let c = 0; c < COLS; c++) {
        passable[r][c] = !grid[r][c].isWall;
      }
    }

    const speed = parseInt(speedInput.value);
    const delay = Math.max(5, 110 - speed * 10);

    function heuristic(a, b) {
      return Math.abs(a.row - b.row) + Math.abs(a.col - b.col);
    }

    function getNeighbors(node) {
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      const result = [];
      for (const [dr, dc] of dirs) {
        const nr = node.row + dr;
        const nc = node.col + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && passable[nr][nc]) {
          result.push({ row: nr, col: nc });
        }
      }
      return result;
    }

    function key(n) { return n.row + ',' + n.col; }
    function findMinF(openSet, fScore) {
      let minNode = openSet[0];
      let minF = fScore.get(key(minNode));
      for (let i = 1; i < openSet.length; i++) {
        const f = fScore.get(key(openSet[i]));
        if (f < minF) { minF = f; minNode = openSet[i]; }
      }
      return minNode;
    }

    const openSet = [startPos];
    const closedSet = new Set();
    const cameFrom = new Map();
    const gScore = new Map();
    const fScore = new Map();
    const sk = key(startPos);
    gScore.set(sk, 0);
    fScore.set(sk, heuristic(startPos, endPos));

    let found = false;
    const MAX_ITER = ROWS * COLS * 2;
    let iter = 0;

    while (openSet.length > 0 && iter < MAX_ITER) {
      iter++;
      const current = findMinF(openSet, fScore);
      const ck = key(current);

      if (current.row === endPos.row && current.col === endPos.col) {
        found = true;
        // 重构路径
        let node = current;
        const path = [];
        while (cameFrom.has(key(node))) {
          path.push(node);
          node = cameFrom.get(key(node));
        }
        path.reverse(); // 从起点到终点
        for (const p of path) {
          if (!grid[p.row][p.col].isStart && !grid[p.row][p.col].isEnd) {
            gridEls[p.row][p.col].className = 'pf-cell path';
          }
          await sleep(delay);
        }
        break;
      }

      // 从 openSet 移除当前节点
      const idx = openSet.findIndex(n => key(n) === ck);
      if (idx >= 0) openSet.splice(idx, 1);
      closedSet.add(ck);

      // 标记为已探索（蓝色）
      if (!grid[current.row][current.col].isStart && !grid[current.row][current.col].isEnd) {
        gridEls[current.row][current.col].className = 'pf-cell explored';
      }

      const neighbors = getNeighbors(current);
      for (const neighbor of neighbors) {
        const nk = key(neighbor);
        if (closedSet.has(nk)) continue;

        const tentativeG = gScore.get(ck) + 1;

        if (!openSet.some(n => key(n) === nk)) {
          openSet.push(neighbor);
        } else if (tentativeG >= (gScore.get(nk) || Infinity)) {
          continue;
        }

        cameFrom.set(nk, current);
        gScore.set(nk, tentativeG);
        fScore.set(nk, tentativeG + heuristic(neighbor, endPos));

        // 标记为已访问（浅蓝）
        if (!grid[neighbor.row][neighbor.col].isStart && !grid[neighbor.row][neighbor.col].isEnd) {
          gridEls[neighbor.row][neighbor.col].className = 'pf-cell visited';
        }
      }

      // 挂起控制权，展示搜索蔓延动画
      await sleep(delay);
    }

    if (!found) {
      updateStatus('❌ 未找到可行路径！');
    } else {
      updateStatus('✅ 寻路完成！');
    }

    isRunning = false;
    startBtn.disabled = false;
  }

  // ---- 生命周期 ----
  MODULES[3].init = function() {
    statusEl = document.getElementById('pf-status');
    startBtn = document.getElementById('pf-start-btn');
    clearBtn = document.getElementById('pf-clear-btn');
    resetBtn = document.getElementById('pf-reset-btn');
    speedInput = document.getElementById('pf-speed');

    createEmptyGrid();
    renderGrid();

    // 按钮事件
    startBtn.addEventListener('click', runAStar);
    clearBtn.addEventListener('click', () => {
      if (isRunning) return;
      clearAll();
      renderGrid();
    });
    resetBtn.addEventListener('click', () => {
      if (isRunning) return;
      resetVisuals();
    });

    updateStatus('点击网格设置起点 (S)，再设终点 (E)，然后拖拽画墙');
  };

  MODULES[3].destroy = function() {
    isRunning = false;
    if (startBtn) startBtn.disabled = false;
    grid = [];
    gridEls = [];
    startPos = null;
    endPos = null;
    mouseDownCell = null;
    isDrawing = false;
    gridContainer = null;
    statusEl = startBtn = clearBtn = resetBtn = speedInput = null;
  };
})();


// ================================================================
// MODULE 5: 自定义视频播放器 UI
// ================================================================

(function() {
  let video, playBtn, timeEl, progressWrap, progressFill, progressThumb;
  let volumeInput, muteBtn, fullscreenBtn;
  let isDragging = false;
  let isMuted = false;
  let prevVolume = 1;
  let active = false;

  // 本地 MP4 文件（相对于 index.html 的路径）
  const VIDEO_URL = '../task-list/test.mp4';

  /** 格式化时间为 mm:ss */
  function formatTime(s) {
    if (!s || isNaN(s)) return '00:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  /** 更新进度条 */
  function updateProgress(clientX) {
    const rect = progressWrap.getBoundingClientRect();
    let pct = (clientX - rect.left) / rect.width;
    pct = clamp(pct, 0, 1);
    progressFill.style.width = (pct * 100) + '%';
    progressThumb.style.left = (pct * 100) + '%';
    return pct;
  }

  /** 播放/暂停切换 */
  function togglePlay() {
    if (video.paused) {
      video.play().catch(() => {});
      playBtn.textContent = '⏸';
    } else {
      video.pause();
      playBtn.textContent = '▶';
    }
  }

  /** timeupdate 回调：更新进度条和时间显示 */
  function onTimeUpdate() {
    if (isDragging) return; // 拖拽期间切断 timeupdate 对 UI 的控制
    if (!video.duration) return;
    const pct = video.currentTime / video.duration;
    progressFill.style.width = (pct * 100) + '%';
    progressThumb.style.left = (pct * 100) + '%';
    timeEl.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
  }

  /** 进度条 mousedown：开始拖拽 */
  function onProgressMouseDown(e) {
    e.preventDefault();
    isDragging = true;
    const pct = updateProgress(e.clientX);
    video.currentTime = pct * video.duration;
    // 拖拽期间预览帧（通过 seek 实现）
  }

  /** document mousemove：拖拽进度 */
  function onDocMouseMove(e) {
    if (!isDragging) return;
    const pct = updateProgress(e.clientX);
    video.currentTime = pct * video.duration;
  }

  /** document mouseup：结束拖拽 */
  function onDocMouseUp() {
    if (!isDragging) return;
    isDragging = false;
    // 恢复 timeupdate 控制
    if (!video.paused) {
      playBtn.textContent = '⏸';
    }
  }

  // ---- 生命周期 ----
  MODULES[4].init = function() {
    if (active) return;
    active = true;

    video = document.getElementById('vp-video');
    playBtn = document.getElementById('vp-play-btn');
    timeEl = document.getElementById('vp-time');
    progressWrap = document.getElementById('vp-progress-wrap');
    progressFill = document.getElementById('vp-progress-fill');
    progressThumb = document.getElementById('vp-progress-thumb');
    volumeInput = document.getElementById('vp-volume');
    muteBtn = document.getElementById('vp-mute-btn');
    fullscreenBtn = document.getElementById('vp-fullscreen-btn');

    // 设置视频源
    video.src = VIDEO_URL;
    video.controls = false;

    // ---- 播放控制 ----
    playBtn.addEventListener('click', togglePlay);
    video.addEventListener('play', () => { playBtn.textContent = '⏸'; });
    video.addEventListener('pause', () => { playBtn.textContent = '▶'; });
    video.addEventListener('timeupdate', onTimeUpdate);

    // 视频加载完成后显示时长
    video.addEventListener('loadedmetadata', () => {
      timeEl.textContent = '00:00 / ' + formatTime(video.duration);
    });

    // ---- 进度条拖拽（事件绑定到 window/document 防止滑出失效） ----
    progressWrap.addEventListener('mousedown', onProgressMouseDown);
    document.addEventListener('mousemove', onDocMouseMove);
    document.addEventListener('mouseup', onDocMouseUp);

    // 点击进度条跳转
    progressWrap.addEventListener('click', (e) => {
      if (isDragging) return;
      const pct = updateProgress(e.clientX);
      video.currentTime = pct * video.duration;
    });

    // ---- 音量控制 ----
    volumeInput.addEventListener('input', () => {
      video.volume = parseFloat(volumeInput.value);
      isMuted = video.volume === 0;
      muteBtn.textContent = isMuted ? '🔇' : video.volume < 0.5 ? '🔉' : '🔊';
      if (!isMuted) prevVolume = video.volume;
    });

    muteBtn.addEventListener('click', () => {
      if (isMuted) {
        video.volume = prevVolume || 0.5;
        volumeInput.value = video.volume;
        muteBtn.textContent = '🔊';
        isMuted = false;
      } else {
        prevVolume = video.volume || 0.5;
        video.volume = 0;
        volumeInput.value = 0;
        muteBtn.textContent = '🔇';
        isMuted = true;
      }
    });

    // ---- 全屏切换 ----
    fullscreenBtn.addEventListener('click', () => {
      const container = video.closest('.vp-container') || video.parentElement;
      if (!document.fullscreenElement) {
        if (container.requestFullscreen) {
          container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) {
          container.webkitRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    });

    // 键盘快捷键：空格切换播放
    document.addEventListener('keydown', function onKey(e) {
      if (!active) return;
      // 只在当前 tab 下生效
      const panel = document.querySelector('.tab-panel.active[data-tab="4"]');
      if (!panel) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      }
    });
  };

  MODULES[4].destroy = function() {
    active = false;
    if (video) {
      video.pause();
      video.src = '';
      video.load();
    }
    // 清理事件
    document.removeEventListener('mousemove', onDocMouseMove);
    document.removeEventListener('mouseup', onDocMouseUp);
    video = playBtn = timeEl = progressWrap = progressFill = progressThumb = null;
    volumeInput = muteBtn = fullscreenBtn = null;
    isDragging = false;
    isMuted = false;
  };
})();


// ================================================================
// 初始化：激活第一个模块
// ================================================================

document.addEventListener('DOMContentLoaded', () => {
  if (MODULES[0].init) MODULES[0].init();
});
</script>
</body>
